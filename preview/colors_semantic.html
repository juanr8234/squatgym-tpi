<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card"><div class="row" style="gap:20px">
<div class="swatch"><div class="swatch-box" style="background:#22C55E"></div><div class="swatch-meta"><div class="swatch-name">OK</div><div class="swatch-hex">#22C55E</div><div class="swatch-hex">Habilitada · Presente</div></div></div>
<div class="swatch"><div class="swatch-box" style="background:#E8343A"></div><div class="swatch-meta"><div class="swatch-name">ERROR</div><div class="swatch-hex">#E8343A</div><div class="swatch-hex">Deudor · Ausente</div></div></div>
<div class="swatch"><div class="swatch-box" style="background:#F59E0B"></div><div class="swatch-meta"><div class="swatch-name">WARN</div><div class="swatch-hex">#F59E0B</div><div class="swatch-hex">Vencimientos</div></div></div>
<div class="col" style="gap:6px">
  <span class="sg-badge sg-badge--ok">Habilitada</span>
  <span class="sg-badge sg-badge--err">Deudor</span>
  <span class="sg-badge sg-badge--warn">Por vencer</span>
  <span class="sg-badge sg-badge--mut">Inactivo</span>
</div>
</div></div></body></html>
