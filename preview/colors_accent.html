<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card"><div class="row" style="gap:20px;align-items:center">
<div class="swatch"><div class="swatch-box" style="background:#FF6B00"></div><div class="swatch-meta"><div class="swatch-name">ACCENT</div><div class="swatch-hex">#FF6B00</div><div class="swatch-hex">Primary CTA, links</div></div></div>
<div class="swatch"><div class="swatch-box" style="background:#FF3A00"></div><div class="swatch-meta"><div class="swatch-name">ACCENT 2</div><div class="swatch-hex">#FF3A00</div><div class="swatch-hex">Gradient end</div></div></div>
<div style="flex:1;min-width:220px">
  <div style="height:56px;background:linear-gradient(135deg,#FF6B00,#FF3A00);clip-path:polygon(16% 0,100% 0,100% 100%,0 100%)"></div>
  <div class="swatch-hex" style="margin-top:6px">Signature gradient — login panel, avatars</div>
</div>
<div class="col" style="gap:4px">
  <div style="font-size:11px;color:#777;text-transform:uppercase;letter-spacing:.1em">Tints</div>
  <div style="display:flex;gap:4px">
    <div style="width:36px;height:22px;background:rgba(255,107,0,.08);border:1px solid rgba(255,107,0,.15)" title="8%"></div>
    <div style="width:36px;height:22px;background:rgba(255,107,0,.15);border:1px solid rgba(255,107,0,.3)" title="15%"></div>
    <div style="width:36px;height:22px;background:rgba(255,107,0,.30);border:1px solid rgba(255,107,0,.5)" title="30%"></div>
  </div>
  <div class="swatch-hex">08 · 15 · 30</div>
</div>
</div></div></body></html>
