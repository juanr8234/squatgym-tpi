<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="font-family:'Barlow'">
<div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap">
<div style="width:80px;height:56px;background:#131313;border:1px solid rgba(255,255,255,.07)"></div>
<div style="font-size:12px;color:#777">Hairline<br>1px rgba(255,255,255,.07)</div>
<div style="width:80px;height:56px;background:#131313;border:1px solid rgba(255,255,255,.07);border-left:3px solid #FF6B00"></div>
<div style="font-size:12px;color:#777">Accent border<br>3px left on stat/card</div>
<div style="width:80px;height:56px;background:#131313;border:1px solid rgba(255,255,255,.07);border-top:3px solid #E8343A"></div>
<div style="font-size:12px;color:#777">Destructive box<br>3px top on confirm</div>
</div>
<div style="margin-top:14px;display:flex;gap:14px;align-items:center">
<div style="width:56px;height:56px;background:linear-gradient(135deg,#FF6B00,#FF3A00);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:1.6rem;color:#000">G</div>
<div style="font-size:12px;color:#777">Radius 50% — avatars only.<br>Everything else is SHARP (0px) — or the 7px CTA bevel clip-path.</div>
</div>
</div></body></html>
