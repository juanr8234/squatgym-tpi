<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card"><div class="row" style="gap:10px;align-items:center">
<button class="sg-btn sg-btn--primary">▶ INGRESAR</button>
<button class="sg-btn sg-btn--success">✔ CONFIRMAR</button>
<button class="sg-btn sg-btn--danger">✗ DAR DE BAJA</button>
<button class="sg-btn sg-btn--secondary">← VOLVER</button>
</div>
<div style="margin-top:14px;display:flex;gap:6px;align-items:center">
<button style="padding:.22rem .55rem;font-size:.7rem;letter-spacing:.04em;text-transform:uppercase;border:none;font-family:'Barlow';font-weight:600;background:rgba(119,119,119,.15);color:#F0F0F0">Ver</button>
<button style="padding:.22rem .55rem;font-size:.7rem;letter-spacing:.04em;text-transform:uppercase;border:none;font-family:'Barlow';font-weight:600;background:rgba(255,107,0,.12);color:#FF6B00">Editar</button>
<button style="padding:.22rem .55rem;font-size:.7rem;letter-spacing:.04em;text-transform:uppercase;border:none;font-family:'Barlow';font-weight:600;background:rgba(232,52,58,.12);color:#E8343A">Baja</button>
<span style="color:#777;font-size:11px;margin-left:8px">Action buttons — table rows</span>
</div>
<div style="margin-top:10px;color:#777;font-size:11px">Primary/Success/Danger use signature 7px bevel clip-path. Secondary is flat bordered.</div>
</div></body></html>
