<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>SquatGym — UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--sg-bg);color:var(--sg-txt);font-family:var(--sg-ff-body)}
a{color:var(--sg-acc);text-decoration:none}

/* Login */
#login-screen{min-height:100vh;display:flex;overflow:hidden}
.login-l{flex:1;display:flex;flex-direction:column;justify-content:center;padding:3rem 4rem}
.login-r{width:42%;background:linear-gradient(135deg,var(--sg-acc),var(--sg-acc2));clip-path:var(--sg-clip-login);display:flex;align-items:center;justify-content:center;position:relative}
.login-r-num{font-family:var(--sg-ff-display);font-size:22rem;color:rgba(0,0,0,.08);position:absolute}
.login-logo{font-family:var(--sg-ff-display);font-size:2.6rem;letter-spacing:.04em;margin-bottom:.2rem}
.login-logo span{color:var(--sg-acc)}
.login-tag{color:var(--sg-mut);font-size:.85rem;margin-bottom:2rem}
.login-form{max-width:360px}
.login-t{font-family:var(--sg-ff-display);font-size:1.6rem;letter-spacing:.04em;margin-bottom:1rem}
.role-btns{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:1.5rem}
.role-btn{flex:1;min-width:90px;padding:.7rem .4rem;text-align:center;cursor:pointer;font-family:'Barlow';font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border:1px solid var(--sg-bor);background:var(--sg-sur);color:var(--sg-txt);transition:all .2s}
.role-btn:hover{border-color:var(--sg-acc);color:var(--sg-acc);background:rgba(255,107,0,.08)}
.role-btn .role-ico{font-size:1.4rem;display:block;margin-bottom:.3rem}

/* App */
#app{display:none;min-height:100vh}
.topbar{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--sg-bor);padding:.55rem 1.5rem;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:var(--sg-ff-display);font-size:1.5rem;letter-spacing:.04em;cursor:pointer;color:var(--sg-txt)}
.logo span{color:var(--sg-acc)}
.topbar-r{display:flex;align-items:center;gap:1rem}
.role-badge{padding:.2rem .65rem;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;font-weight:700;background:rgba(255,107,0,.15);color:var(--sg-acc);border:1px solid rgba(255,107,0,.3)}
.user-label{font-size:.82rem;color:var(--sg-mut)}
.btn-out{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--sg-mut);background:none;border:1px solid var(--sg-bor);padding:.3rem .7rem;cursor:pointer;font-family:'Barlow';transition:all .2s}
.btn-out:hover{color:var(--sg-acc);border-color:var(--sg-acc)}
.app-body{display:flex;min-height:calc(100vh - 48px)}

/* Sidebar */
.sidebar{width:210px;background:var(--sg-sur);border-right:1px solid var(--sg-bor);padding:1rem 0;flex-shrink:0}
.sb-section{font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--sg-mut);padding:.5rem 1.2rem;margin-top:.5rem}
.sb-item{display:flex;align-items:center;gap:.65rem;padding:.65rem 1.2rem;font-size:.82rem;color:var(--sg-mut);cursor:pointer;transition:all .15s;border-left:3px solid transparent}
.sb-item:hover,.sb-item.active{color:var(--sg-acc);border-left-color:var(--sg-acc);background:rgba(255,107,0,.05)}
.sb-item .sb-ico{font-size:1rem;width:1.2rem;text-align:center}
.main{flex:1;overflow-y:auto;max-height:calc(100vh - 48px)}
.scr{display:none;padding:1.5rem 2rem}
.scr.active{display:block}

/* Components */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.2rem;flex-wrap:wrap;gap:.75rem}
.ph-title{font-family:var(--sg-ff-display);font-size:2rem;letter-spacing:.03em;line-height:1}
.ph-title span{color:var(--sg-acc)}
.ph-sub{color:var(--sg-mut);font-size:.82rem;margin-top:.15rem}
.btn{font-family:'Barlow';font-size:.78rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:.6rem 1.2rem;border:none;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:.4rem}
.btn-p{background:var(--sg-acc);color:#000;clip-path:var(--sg-clip-cta)}
.btn-p:hover{filter:brightness(1.15)}
.btn-s{background:transparent;color:var(--sg-txt);border:1px solid var(--sg-bor)}
.btn-s:hover{border-color:var(--sg-acc);color:var(--sg-acc)}
.btn-d{background:var(--sg-err);color:#fff;clip-path:var(--sg-clip-cta)}
.btn-ok{background:var(--sg-ok);color:#000;clip-path:var(--sg-clip-cta)}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:.9rem}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:.9rem}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:.9rem}

.stat{background:var(--sg-sur);border:1px solid var(--sg-bor);border-left:3px solid var(--sg-acc);padding:1rem 1.2rem}
.stat-lbl{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--sg-mut)}
.stat-val{font-family:var(--sg-ff-display);font-size:2.2rem;line-height:1;margin-top:.15rem}
.c-acc{color:var(--sg-acc)}.c-ok{color:var(--sg-ok)}.c-err{color:var(--sg-err)}.c-warn{color:var(--sg-warn)}

.tbl-wrap{background:var(--sg-sur);border:1px solid var(--sg-bor);margin-bottom:1rem}
.tbl-top{padding:.7rem 1.2rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--sg-bor);gap:.6rem;flex-wrap:wrap}
.tbl-title{font-family:var(--sg-ff-display);font-size:1.1rem;letter-spacing:.04em}
table{width:100%;border-collapse:collapse}
th{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--sg-mut);padding:.6rem 1rem;text-align:left;border-bottom:1px solid var(--sg-bor);font-weight:700}
td{padding:.65rem 1rem;border-bottom:1px solid rgba(255,255,255,.03);font-size:.85rem}
tr:hover td{background:rgba(255,107,0,.03)}

.badge{padding:.18rem .55rem;font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;font-weight:700;display:inline-block}
.b-ok{background:rgba(34,197,94,.12);color:var(--sg-ok);border:1px solid rgba(34,197,94,.3)}
.b-err{background:rgba(232,52,58,.12);color:var(--sg-err);border:1px solid rgba(232,52,58,.3)}
.b-warn{background:rgba(245,158,11,.12);color:var(--sg-warn);border:1px solid rgba(245,158,11,.3)}
.b-mut{background:rgba(119,119,119,.12);color:var(--sg-mut);border:1px solid rgba(119,119,119,.3)}
.ab{padding:.22rem .55rem;font-size:.7rem;letter-spacing:.04em;text-transform:uppercase;border:none;cursor:pointer;font-family:'Barlow';font-weight:600;transition:all .15s;margin-left:.2rem}
.ab-v{background:rgba(119,119,119,.15);color:var(--sg-txt)}.ab-v:hover{background:rgba(119,119,119,.35)}
.ab-e{background:rgba(255,107,0,.12);color:var(--sg-acc)}.ab-e:hover{background:var(--sg-acc);color:#000}
.ab-d{background:rgba(232,52,58,.12);color:var(--sg-err)}.ab-d:hover{background:var(--sg-err);color:#fff}

/* Forms */
.fsec{background:var(--sg-sur);border:1px solid var(--sg-bor);padding:1.2rem;margin-bottom:.9rem}
.fsec-t{font-family:var(--sg-ff-display);font-size:1rem;letter-spacing:.04em;margin-bottom:.8rem;padding-bottom:.4rem;border-bottom:1px solid var(--sg-bor);color:var(--sg-acc)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-bottom:.8rem}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.8rem;margin-bottom:.8rem}
.fg{display:flex;flex-direction:column;gap:.25rem}
.fg.full{grid-column:1/-1}
label{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--sg-mut);font-weight:700}
input[type=text],input[type=email],input[type=tel],input[type=date],input[type=password],select,textarea{background:var(--sg-sur2);border:1px solid var(--sg-bor);color:var(--sg-txt);padding:.5rem .75rem;font-family:'Barlow';font-size:.85rem;outline:none;transition:border-color .15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--sg-acc)}
.factions{display:flex;gap:.65rem;justify-content:flex-end;padding-top:1rem;border-top:1px solid var(--sg-bor);margin-top:.5rem}
.srch{display:flex;gap:.6rem;align-items:center;flex-wrap:wrap}
.srch input,.srch select{background:var(--sg-sur2);border:1px solid var(--sg-bor);color:var(--sg-txt);padding:.5rem .75rem;font-family:'Barlow';font-size:.82rem;outline:none}
.srch input{min-width:220px}

.alert{padding:.75rem 1rem;border-left:3px solid;margin-bottom:.9rem;font-size:.85rem;line-height:1.5}
.al-warn{background:rgba(245,158,11,.08);border-color:var(--sg-warn);color:var(--sg-warn)}
.al-err{background:rgba(232,52,58,.08);border-color:var(--sg-err);color:var(--sg-err)}
.al-ok{background:rgba(34,197,94,.08);border-color:var(--sg-ok);color:var(--sg-ok)}
.al-info{background:rgba(255,107,0,.08);border-color:var(--sg-acc);color:var(--sg-acc)}
.dr{display:flex;justify-content:space-between;align-items:center;padding:.55rem 0;border-bottom:1px solid var(--sg-bor);font-size:.85rem}
.dr:last-child{border-bottom:none}
.dr-lbl{color:var(--sg-mut);font-size:.72rem;letter-spacing:.08em;text-transform:uppercase}
.dr-val{font-weight:500}

.qa{background:var(--sg-sur);border:1px solid var(--sg-bor);padding:1.2rem;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.qa::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--sg-acc);transform:scaleX(0);transform-origin:left;transition:transform .3s}
.qa:hover{border-color:rgba(255,107,0,.3)}.qa:hover::before{transform:scaleX(1)}
.qa-ico{font-size:1.6rem;margin-bottom:.4rem}
.qa-title{font-family:var(--sg-ff-display);font-size:1rem;letter-spacing:.04em}
.qa-desc{font-size:.75rem;color:var(--sg-mut)}

.profile-box{background:var(--sg-sur);border:1px solid var(--sg-bor);padding:1.2rem;display:flex;gap:1rem;align-items:flex-start;margin-bottom:1rem}
.profile-avatar{width:56px;height:56px;background:linear-gradient(135deg,var(--sg-acc),var(--sg-acc2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--sg-ff-display);font-size:1.6rem;color:#000;flex-shrink:0}
.profile-name{font-family:var(--sg-ff-display);font-size:1.4rem;letter-spacing:.03em;line-height:1}
.profile-sub{color:var(--sg-mut);font-size:.78rem;margin-top:.2rem}

.sec-t{font-family:var(--sg-ff-display);font-size:1.1rem;letter-spacing:.04em;margin:1.2rem 0 .7rem;display:flex;align-items:center;gap:.5rem}
.sec-t::after{content:'';flex:1;height:1px;background:var(--sg-bor)}
.text-mut{color:var(--sg-mut)}.text-sm{font-size:.78rem}
.mt1{margin-top:.9rem}.mb1{margin-bottom:.9rem}
.flex{display:flex}.gap1{gap:.9rem}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="Screens.jsx"></script>

<script type="text/babel">
const { useState } = React;
function App() {
  const [role, setRole] = useState(null);
  const [scr, setScr] = useState('dashboard');
  const [selected, setSelected] = useState(null);

  if (!role) return <LoginScreen onLogin={r => { setRole(r); setScr('dashboard'); }} />;

  const onNav = key => setScr(key);
  const onSelect = a => { setSelected(a); setScr('detalle-alumno'); };

  let screen;
  if (scr === 'dashboard')        screen = <DashboardScreen role={role} onNav={onNav}/>;
  else if (scr === 'alumnos')     screen = <AlumnosScreen onNav={onNav} onSelect={onSelect}/>;
  else if (scr === 'form-alumno') screen = <AlumnoFormScreen onNav={onNav}/>;
  else if (scr === 'detalle-alumno') screen = <DetalleAlumnoScreen alumno={selected} onNav={onNav}/>;
  else screen = <div className="scr active"><PageHeader title="PRÓXIMAMENTE" accent={scr.toUpperCase()} sub="Pantalla en construcción"/></div>;

  return (
    <div style={{minHeight:'100vh'}}>
      <Topbar role={role} onLogout={()=>setRole(null)} onHome={()=>setScr('dashboard')}/>
      <div className="app-body">
        <Sidebar role={role} active={scr} onNav={onNav}/>
        <div className="main">{screen}</div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
