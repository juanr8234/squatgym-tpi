<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>SquatGym — UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
/* Unified modern sans — Inter — for every UI text.
   Display type (Bebas Neue) remains only for the logo wordmark. */
body{
  background: #0A0A0A;
  color: var(--sg-txt);
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  font-feature-settings: 'ss01','cv11';
  -webkit-font-smoothing: antialiased;
  /* Polished-concrete texture: layered radial noise + subtle horizontal
     brushed streaks. No external asset needed. */
  background-image:
    radial-gradient(ellipse 80% 60% at 30% 20%, rgba(255,107,0,.025), transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 90%, rgba(255,255,255,.02), transparent 55%),
    repeating-linear-gradient(90deg, rgba(255,255,255,.012) 0 1px, transparent 1px 3px),
    repeating-linear-gradient(0deg,  rgba(0,0,0,.22) 0 1px, transparent 1px 2px),
    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.07  0 0 0 0 0.07  0 0 0 0 0.07  0 0 0 0.55 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.55'/></svg>"),
    linear-gradient(180deg, #0E0E10 0%, #0A0A0C 50%, #08080A 100%);
  background-attachment: fixed;
}
a{color:var(--sg-acc);text-decoration:none}

/* Login */
#login-screen{min-height:100vh;display:flex;overflow:hidden;position:relative}
.login-l{flex:1;display:flex;flex-direction:column;justify-content:center;padding:3rem 4rem;position:relative}
.login-r{
  width:42%;
  /* Deeper → brighter orange gradient */
  background:
    radial-gradient(ellipse at 30% 20%, rgba(255,180,80,.25), transparent 55%),
    linear-gradient(135deg, #C23A00 0%, #FF6B00 55%, #FF8A2E 100%);
  clip-path:var(--sg-clip-login);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
/* Hexagon watermark — very soft, scattered */
.login-r::before{
  content:"";position:absolute;inset:0;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='104' viewBox='0 0 120 104'><g fill='none' stroke='rgba(255,255,255,0.09)' stroke-width='1.4'><polygon points='30,2 58,18 58,50 30,66 2,50 2,18'/><polygon points='90,2 118,18 118,50 90,66 62,50 62,18'/><polygon points='60,54 88,70 88,102 60,118 32,102 32,70'/></g></svg>");
  background-size: 180px 156px; opacity:.85; mix-blend-mode:overlay;
}
.login-r-num{font-family:var(--sg-ff-display);font-size:22rem;color:rgba(0,0,0,.10);position:absolute;z-index:1}
.login-logo{font-family:var(--sg-ff-display);font-size:2.6rem;letter-spacing:.04em;margin-bottom:.45rem}
.login-logo span{color:var(--sg-acc)}
.login-tag{color:#C9C9CF;font-size:1rem;font-weight:400;margin-bottom:2.2rem;max-width:420px;line-height:1.5}
.login-form{max-width:380px}
.login-t{font-family:var(--sg-ff-display);font-size:1.8rem;letter-spacing:.04em;margin-bottom:1.2rem}
.role-btns{display:grid;grid-template-columns:repeat(5,1fr);gap:.55rem;margin-top:1.5rem}
.role-btn{
  padding:.85rem .35rem;text-align:center;cursor:pointer;
  font-family:'Inter',sans-serif;font-size:.7rem;font-weight:600;
  letter-spacing:.06em;text-transform:uppercase;
  border:1px solid rgba(255,255,255,.09);
  border-radius:10px;
  background:linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,.008));
  color:#E7E7EA;
  transition:transform .15s ease, border-color .2s, background .2s, box-shadow .2s;
  display:flex;flex-direction:column;align-items:center;gap:.35rem;
}
.role-btn:hover{
  border-color:rgba(255,107,0,.55);color:var(--sg-acc);
  background:linear-gradient(180deg, rgba(255,107,0,.12), rgba(255,107,0,.04));
  transform:translateY(-1px);
  box-shadow: 0 4px 14px rgba(255,107,0,.14), inset 0 1px 0 rgba(255,255,255,.05);
}
.role-btn .role-ico{
  width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  border-radius:8px;border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.035);
  color:#E7E7EA;
}
.role-btn:hover .role-ico{border-color:rgba(255,107,0,.4);color:var(--sg-acc);background:rgba(255,107,0,.08)}
.role-btn svg{width:18px;height:18px;stroke-width:1.6}

/* App */
#app{display:none;min-height:100vh}
.topbar{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--sg-bor);padding:.55rem 1.5rem;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:var(--sg-ff-display);font-size:1.5rem;letter-spacing:.04em;cursor:pointer;color:var(--sg-txt)}
.logo span{color:var(--sg-acc)}
.topbar-r{display:flex;align-items:center;gap:1rem}
.role-badge{padding:.2rem .65rem;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;font-weight:700;background:rgba(255,107,0,.15);color:var(--sg-acc);border:1px solid rgba(255,107,0,.3)}
.user-label{font-size:.88rem;color:#C9C9CF;font-weight:400}
.btn-out{font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:#C9C9CF;background:none;border:1px solid rgba(255,255,255,.14);padding:.4rem .85rem;cursor:pointer;font-family:'Inter',sans-serif;font-weight:500;border-radius:6px;transition:all .2s}
.btn-out:hover{color:var(--sg-acc);border-color:var(--sg-acc)}
.app-body{display:flex;min-height:calc(100vh - 48px)}

/* Sidebar */
.sidebar{width:210px;background:var(--sg-sur);border-right:1px solid var(--sg-bor);padding:1rem 0;flex-shrink:0}
.sb-section{font-size:.66rem;letter-spacing:.18em;text-transform:uppercase;color:#8F8F96;padding:.5rem 1.2rem;margin-top:.5rem;font-weight:600}
.sb-item{display:flex;align-items:center;gap:.65rem;padding:.65rem 1.2rem;font-size:.85rem;color:#C9C9CF;cursor:pointer;transition:all .15s;border-left:3px solid transparent;font-weight:500}
.sb-item:hover,.sb-item.active{color:var(--sg-acc);border-left-color:var(--sg-acc);background:rgba(255,107,0,.05)}
.sb-item .sb-ico{font-size:1rem;width:1.2rem;text-align:center}
.main{flex:1;overflow-y:auto;max-height:calc(100vh - 48px)}
.scr{display:none;padding:1.5rem 2rem}
.scr.active{display:block}

/* Components */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.2rem;flex-wrap:wrap;gap:.75rem}
.ph-title{font-family:var(--sg-ff-display);font-size:2rem;letter-spacing:.03em;line-height:1}
.ph-title span{color:var(--sg-acc)}
.ph-sub{color:#B0B0B8;font-size:.92rem;margin-top:.25rem;font-weight:400}
.btn{font-family:'Inter',sans-serif;font-size:.8rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:.7rem 1.3rem;border:none;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:.45rem;border-radius:6px}
.btn-p{background:linear-gradient(180deg,#FF7A1A,#E65C00);color:#0A0A0A;clip-path:var(--sg-clip-cta);border-radius:0;box-shadow:0 4px 14px rgba(255,107,0,.35), inset 0 1px 0 rgba(255,255,255,.25), inset 0 -2px 0 rgba(0,0,0,.18)}
.btn-p:hover{filter:brightness(1.08);transform:translateY(-1px);box-shadow:0 6px 18px rgba(255,107,0,.45), inset 0 1px 0 rgba(255,255,255,.3), inset 0 -2px 0 rgba(0,0,0,.18)}
.btn-p:active{transform:translateY(0);box-shadow:0 2px 6px rgba(255,107,0,.3), inset 0 2px 4px rgba(0,0,0,.25)}
.btn-s{background:transparent;color:var(--sg-txt);border:1px solid var(--sg-bor)}
.btn-s:hover{border-color:var(--sg-acc);color:var(--sg-acc)}
.btn-d{background:var(--sg-err);color:#fff;clip-path:var(--sg-clip-cta)}
.btn-ok{background:var(--sg-ok);color:#000;clip-path:var(--sg-clip-cta)}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:.9rem}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:.9rem}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:.9rem}

.stat{background:var(--sg-sur);border:1px solid var(--sg-bor);border-left:3px solid var(--sg-acc);padding:1rem 1.2rem}
.stat-lbl{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--sg-mut)}
.stat-val{font-family:var(--sg-ff-display);font-size:2.2rem;line-height:1;margin-top:.15rem}
.c-acc{color:var(--sg-acc)}.c-ok{color:var(--sg-ok)}.c-err{color:var(--sg-err)}.c-warn{color:var(--sg-warn)}

.tbl-wrap{background:var(--sg-sur);border:1px solid var(--sg-bor);margin-bottom:1rem}
.tbl-top{padding:.7rem 1.2rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--sg-bor);gap:.6rem;flex-wrap:wrap}
.tbl-title{font-family:var(--sg-ff-display);font-size:1.1rem;letter-spacing:.04em}
table{width:100%;border-collapse:collapse}
th{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--sg-mut);padding:.6rem 1rem;text-align:left;border-bottom:1px solid var(--sg-bor);font-weight:700}
td{padding:.65rem 1rem;border-bottom:1px solid rgba(255,255,255,.03);font-size:.85rem}
tr:hover td{background:rgba(255,107,0,.03)}

.badge{padding:.18rem .55rem;font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;font-weight:700;display:inline-block}
.b-ok{background:rgba(34,197,94,.12);color:var(--sg-ok);border:1px solid rgba(34,197,94,.3)}
.b-err{background:rgba(232,52,58,.12);color:var(--sg-err);border:1px solid rgba(232,52,58,.3)}
.b-warn{background:rgba(245,158,11,.12);color:var(--sg-warn);border:1px solid rgba(245,158,11,.3)}
.b-mut{background:rgba(119,119,119,.12);color:var(--sg-mut);border:1px solid rgba(119,119,119,.3)}
.ab{padding:.22rem .55rem;font-size:.7rem;letter-spacing:.04em;text-transform:uppercase;border:none;cursor:pointer;font-family:'Barlow';font-weight:600;transition:all .15s;margin-left:.2rem}
.ab-v{background:rgba(119,119,119,.15);color:var(--sg-txt)}.ab-v:hover{background:rgba(119,119,119,.35)}
.ab-e{background:rgba(255,107,0,.12);color:var(--sg-acc)}.ab-e:hover{background:var(--sg-acc);color:#000}
.ab-d{background:rgba(232,52,58,.12);color:var(--sg-err)}.ab-d:hover{background:var(--sg-err);color:#fff}

/* Forms */
.fsec{background:var(--sg-sur);border:1px solid var(--sg-bor);padding:1.2rem;margin-bottom:.9rem}
.fsec-t{font-family:var(--sg-ff-display);font-size:1rem;letter-spacing:.04em;margin-bottom:.8rem;padding-bottom:.4rem;border-bottom:1px solid var(--sg-bor);color:var(--sg-acc)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-bottom:.8rem}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.8rem;margin-bottom:.8rem}
.fg{display:flex;flex-direction:column;gap:.25rem}
.fg.full{grid-column:1/-1}
label{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:#B8B8BF;font-weight:600}
input[type=text],input[type=email],input[type=tel],input[type=date],input[type=password],select,textarea{background:var(--sg-sur2);border:1px solid rgba(255,255,255,.12);color:var(--sg-txt);padding:.6rem .85rem;font-family:'Inter',sans-serif;font-size:.9rem;outline:none;transition:border-color .15s, box-shadow .15s;width:100%;border-radius:8px}
input::placeholder{color:#9A9AA3;font-weight:400}
input:focus,select:focus,textarea:focus{border-color:var(--sg-acc);box-shadow:0 0 0 3px rgba(255,107,0,.18)}
.factions{display:flex;gap:.65rem;justify-content:flex-end;padding-top:1rem;border-top:1px solid var(--sg-bor);margin-top:.5rem}
.srch{display:flex;gap:.6rem;align-items:center;flex-wrap:wrap}
.srch input,.srch select{background:var(--sg-sur2);border:1px solid var(--sg-bor);color:var(--sg-txt);padding:.5rem .75rem;font-family:'Barlow';font-size:.82rem;outline:none}
.srch input{min-width:220px}

.alert{padding:.75rem 1rem;border-left:3px solid;margin-bottom:.9rem;font-size:.85rem;line-height:1.5}
.al-warn{background:rgba(245,158,11,.08);border-color:var(--sg-warn);color:var(--sg-warn)}
.al-err{background:rgba(232,52,58,.08);border-color:var(--sg-err);color:var(--sg-err)}
.al-ok{background:rgba(34,197,94,.08);border-color:var(--sg-ok);color:var(--sg-ok)}
.al-info{background:rgba(255,107,0,.08);border-color:var(--sg-acc);color:var(--sg-acc)}
.dr{display:flex;justify-content:space-between;align-items:center;padding:.55rem 0;border-bottom:1px solid var(--sg-bor);font-size:.85rem}
.dr:last-child{border-bottom:none}
.dr-lbl{color:#9FA0A8;font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;font-weight:500}
.dr-val{font-weight:500}

.qa{background:linear-gradient(180deg,rgba(255,255,255,.025),rgba(255,255,255,.005));border:1px solid rgba(255,255,255,.09);border-radius:12px;padding:1.2rem;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.qa::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#FF6B00,#FF8A2E);transform:scaleX(0);transform-origin:left;transition:transform .3s;border-radius:12px 12px 0 0}
.qa:hover{border-color:rgba(255,107,0,.5);transform:translateY(-2px);box-shadow:0 8px 22px rgba(0,0,0,.35)}
.qa:hover::before{transform:scaleX(1)}
.qa-ico{width:38px;height:38px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;color:var(--sg-acc);margin-bottom:.65rem}
.qa-ico svg{width:20px;height:20px;stroke-width:1.6}
.qa-title{font-family:'Inter',sans-serif;font-size:.95rem;font-weight:600;letter-spacing:.01em;color:#F0F0F0}
.qa-desc{font-size:.78rem;color:#B0B0B8;margin-top:.15rem}

.profile-box{background:var(--sg-sur);border:1px solid var(--sg-bor);padding:1.2rem;display:flex;gap:1rem;align-items:flex-start;margin-bottom:1rem}
.profile-avatar{width:56px;height:56px;background:linear-gradient(135deg,var(--sg-acc),var(--sg-acc2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--sg-ff-display);font-size:1.6rem;color:#000;flex-shrink:0}
.profile-name{font-family:var(--sg-ff-display);font-size:1.4rem;letter-spacing:.03em;line-height:1}
.profile-sub{color:#B0B0B8;font-size:.85rem;margin-top:.3rem}

.sec-t{font-family:var(--sg-ff-display);font-size:1.1rem;letter-spacing:.04em;margin:1.2rem 0 .7rem;display:flex;align-items:center;gap:.5rem}
.sec-t::after{content:'';flex:1;height:1px;background:var(--sg-bor)}
.text-mut{color:#B0B0B8}.text-sm{font-size:.85rem}
.mt1{margin-top:.9rem}.mb1{margin-bottom:.9rem}
.flex{display:flex}.gap1{gap:.9rem}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="Screens.jsx"></script>

<script type="text/babel">
const { useState } = React;
function App() {
  const [role, setRole] = useState(null);
  const [scr, setScr] = useState('dashboard');
  const [selected, setSelected] = useState(null);

  // Persist navigation across reloads
  React.useEffect(() => {
    try {
      const saved = JSON.parse(localStorage.getItem('sg_state') || 'null');
      if (saved) { setRole(saved.role); setScr(saved.scr || 'dashboard'); }
    } catch {}
  }, []);
  React.useEffect(() => {
    try { localStorage.setItem('sg_state', JSON.stringify({role, scr})); } catch {}
  }, [role, scr]);

  if (!role) return <LoginScreen onLogin={r => { setRole(r); setScr('dashboard'); }} />;

  const onNav = key => setScr(key);
  const onSelect = a => { setSelected(a); setScr('detalle-alumno'); };

  let screen;
  if (scr === 'dashboard')        screen = <DashboardScreen role={role} onNav={onNav}/>;
  else if (scr === 'alumnos')     screen = <AlumnosScreen onNav={onNav} onSelect={onSelect}/>;
  else if (scr === 'form-alumno') screen = <AlumnoFormScreen onNav={onNav}/>;
  else if (scr === 'detalle-alumno') screen = <DetalleAlumnoScreen alumno={selected} onNav={onNav}/>;
  else if (scr === 'asistencia')  screen = <AsistenciaScreen onNav={onNav}/>;
  else screen = <div className="scr active"><PageHeader title="PRÓXIMAMENTE" accent={scr.toUpperCase()} sub="Pantalla en construcción"/></div>;

  return (
    <div style={{minHeight:'100vh'}}>
      <Topbar role={role} onLogout={()=>setRole(null)} onHome={()=>setScr('dashboard')}/>
      <div className="app-body">
        <Sidebar role={role} active={scr} onNav={onNav}/>
        <div className="main">{screen}</div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
